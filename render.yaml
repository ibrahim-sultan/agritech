services:
  - type: web
    name: agrictech-dashboard
    env: node
    plan: free
    rootDir: .
    buildCommand: |
      echo "Installing server dependencies..."
      cd server && npm install
      echo "Installing client dependencies and building..."
      cd ../client && npm install && npm run build
      echo "Build completed successfully"
    startCommand: cd server && node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        value: mongodb+srv://agritech:agritech01@cluster0.bv7n2ce.mongodb.net/agrictech?retryWrites=true&w=majority&appName=Cluster0
      - key: CLIENT_URL
        value: https://agrictech-dashboard.onrender.com
      - key: PORT
        value: 10000
