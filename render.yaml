services:
  - type: web
    name: agrictech-dashboard
    env: node
    plan: free
    buildCommand: npm install && npm run install-all && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        value: mongodb+srv://agritech:agritech01@cluster0.bv7n2ce.mongodb.net/agrictech?retryWrites=true&w=majority&appName=Cluster0
      - key: CLIENT_URL
        value: https://agrictech-dashboard.onrender.com
      - key: PORT
        value: 10000
